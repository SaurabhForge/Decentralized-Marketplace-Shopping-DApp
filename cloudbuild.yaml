steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - us-central1-docker.pkg.dev/$PROJECT_ID/blockmart/blockmart-marketplace-api:$SHORT_SHA
      - api
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - us-central1-docker.pkg.dev/$PROJECT_ID/blockmart/blockmart-marketplace-api:$SHORT_SHA
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - blockmart-marketplace-api
      - --image
      - us-central1-docker.pkg.dev/$PROJECT_ID/blockmart/blockmart-marketplace-api:$SHORT_SHA
      - --region
      - us-central1
      - --allow-unauthenticated
images:
  - us-central1-docker.pkg.dev/$PROJECT_ID/blockmart/blockmart-marketplace-api:$SHORT_SHA
